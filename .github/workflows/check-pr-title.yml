name: check-pr-title

on:
  pull_request:
    branches: ['*']
    types: [opened, edited, synchronize, reopened]

jobs:
  check-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^\[(Fix|Misc|Docs|CI|Test|Perf|Refactor|Ops|Model|Layer|Attn|GDN|KDA|CP|Conv|CE|chore)\][[:space:]]+.+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must start with a semantic prefix, for example:"
            echo "  [Fix] Guard checkpoint weight re-initialization"
            echo "  [Docs] Add agent workflow skills"
            echo "  [CI] Add PR title validation"
            echo
            echo "Allowed prefixes:"
            echo "  [Fix], [Misc], [Docs], [CI], [Test], [Perf], [Refactor], [Ops], [Model], [Layer], [Attn], [GDN], [KDA], [CP], [Conv], [CE], [chore]"
            echo
            echo "Actual title: $PR_TITLE"
            exit 1
          fi
