name: check-pr-title

on:
  pull_request:
    branches: ['*']
    types: [opened, edited, synchronize, reopened]

jobs:
  check-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! grep -qE '^\[[A-Za-z][A-Za-z0-9]*\][[:space:]].+' <<<"$PR_TITLE"; then
            echo "PR title must start with a bracketed tag, for example:"
            echo "  [Fix] Guard checkpoint weight re-initialization"
            echo "  [Docs] Add agent workflow skills"
            echo "  [NSA] Support cached inference"
            echo
            echo "Common tags (any [Tag] is accepted):"
            echo "  [Fix], [Misc], [Docs], [CI], [Test], [Perf], [Refactor], [Ops], [Model], [Layer], [Attn], [GDN], [KDA], [CP], [Conv], [CE], [chore]"
            echo
            echo "Actual title: $PR_TITLE"
            exit 1
          fi
