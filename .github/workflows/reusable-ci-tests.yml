name: Reusable CI

on:
  workflow_call:
    inputs:
      runner:
        description: 'The self-hosted runner to use (e.g., nvidia-h100)'
        required: true
        type: string
      gpu_type:
        description: 'The type of GPU (nvidia or intel)'
        required: true
        type: string
      conda_env_name:
        description: 'The exact name of the pre-existing Conda environment to activate on the runner.'
        required: true
        type: string
      pytorch_version:
        description: 'The PyTorch version to install (e.g., 2.7.0, nightly)'
        required: true
        type: string
      pytorch_cuda_version:
        description: 'The PyTorch CUDA version to use (e.g., cu128 for CUDA 12.8)'
        required: false
        type: string
        default: 'cu128'
      nvcc_toolkit_version:
        description: 'The NVCC toolkit version to install (e.g., 12.8.1)'
        required: false
        type: string
        default: '12.8.1'
      skip_gpu_check:
        description: 'Whether to skip the GPU check (default: false)'
        required: false
        type: boolean
        default: false
      skip_models_tests:
        description: 'Whether to skip the models tests stage (default: false)'
        required: false
        type: boolean
        default: false


jobs:
  test-ops:
    runs-on: ${{ inputs.runner }}
    env:
      FLA_CI_ENV: 1

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup CI Environment
        id: setup
        uses: ./.github/actions/setup-ci-env
        with:
          runner_name: ${{ runner.name }}
          conda_env_name: ${{ inputs.conda_env_name }}
          pytorch_version: ${{ inputs.pytorch_version }}
          gpu_type: ${{ inputs.gpu_type }}
          pytorch_cuda_version: ${{ inputs.pytorch_cuda_version }}
          nvcc_toolkit_version: ${{ inputs.nvcc_toolkit_version }}
          install_tilelang: "true"
          skip_gpu_check: ${{ inputs.skip_gpu_check }}

      - name: Find dependent OP test files for Ops
        if: steps.setup.outputs.skip_tests == 'false'
        id: find-ops-tests
        shell: bash
        run: |
          export TEST_SCOPE="EXCLUDE_MODELS"
          TEST_FILES=$($CONDA_BIN_PATH/python scripts/find_dependent_tests.py "${{ steps.setup.outputs.all_changed_files }}")
          echo "Found ops test files: $TEST_FILES"
          echo "test_files=$TEST_FILES" >> $GITHUB_OUTPUT

      - name: Detect op/backend/dispatch changes
        if: steps.setup.outputs.skip_tests == 'false'
        id: check-dispatch
        shell: bash
        run: |
          CHANGED="${{ steps.setup.outputs.all_changed_files }}"
          # Any change under fla/ops/ triggers the dispatch-on suite: backend dirs
          # obviously need it, but op changes also do because backend impls may rely
          # on op internals (shared helpers, default kwargs, chunk layout). Skipping
          # saves CI only on PRs that touch no op code (e.g. models/, docs, benches).
          if echo "$CHANGED" | tr ' ' '\n' | grep -qE '^fla/ops/'; then
            echo "Op/backend changes detected; will run dispatch-on suite"
            echo "dispatch_changed=true" >> $GITHUB_OUTPUT
          else
            echo "No op changes; skipping dispatch-on suite"
            echo "dispatch_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run pytest on ops test files (dispatch DISABLED, Triton baseline)
        if: steps.find-ops-tests.outputs.test_files && steps.setup.outputs.skip_tests == 'false'
        shell: bash
        env:
          FLA_DISABLE_BACKEND_DISPATCH: "1"
        run: |
          $CONDA_BIN_PATH/pytest -s -v --exitfirst ${{ steps.find-ops-tests.outputs.test_files }}

      - name: Run pytest on ops test files (dispatch ENABLED, backend coverage)
        if: steps.find-ops-tests.outputs.test_files && steps.setup.outputs.skip_tests == 'false' && steps.check-dispatch.outputs.dispatch_changed == 'true'
        shell: bash
        run: |
          $CONDA_BIN_PATH/pytest -s -v --exitfirst ${{ steps.find-ops-tests.outputs.test_files }}

  test-models:
    runs-on: ${{ inputs.runner }}
    needs: test-ops
    if: (success() || failure()) && inputs.skip_models_tests == false
    env:
      FLA_CI_ENV: 1
      FLA_DISABLE_BACKEND_DISPATCH: "1"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup CI Environment
        id: setup
        uses: ./.github/actions/setup-ci-env
        with:
          runner_name: ${{ runner.name }}
          conda_env_name: ${{ inputs.conda_env_name }}
          pytorch_version: ${{ inputs.pytorch_version }}
          gpu_type: ${{ inputs.gpu_type }}
          pytorch_cuda_version: ${{ inputs.pytorch_cuda_version }}
          nvcc_toolkit_version: ${{ inputs.nvcc_toolkit_version }}
          install_tilelang: "false"
          skip_gpu_check: ${{ inputs.skip_gpu_check }}

      - name: Find dependent Model test files for Models
        if: steps.setup.outputs.skip_tests == 'false'
        id: find-models-tests
        shell: bash
        run: |
          export TEST_SCOPE="MODELS_ONLY"
          TEST_FILES=$($CONDA_BIN_PATH/python scripts/find_dependent_tests.py "${{ steps.setup.outputs.all_changed_files }}")
          echo "Found models test files: $TEST_FILES"
          echo "test_files=$TEST_FILES" >> $GITHUB_OUTPUT

      - name: Run pytest on models test files
        if: steps.find-models-tests.outputs.test_files && steps.setup.outputs.skip_tests == 'false'
        shell: bash
        run: |
          $CONDA_BIN_PATH/pytest -s -v --exitfirst ${{ steps.find-models-tests.outputs.test_files }}
